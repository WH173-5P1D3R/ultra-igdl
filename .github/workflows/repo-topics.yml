name: Sync repository topics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/repo-topics.yml
      - .github/topics.txt

permissions:
  contents: write

jobs:
  topics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply topics from .github/topics.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          topics=$(grep -v '^\s*#' .github/topics.txt | grep -v '^\s*$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          curl -fsSL -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/topics" \
            -d "{\"names\":${topics}}"