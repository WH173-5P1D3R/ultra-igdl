# Sync GitHub About topics from .github/topics.txt
# GITHUB_TOKEN cannot update topics — add repo secret REPO_TOPICS_TOKEN (PAT with repo scope),
# then run this workflow manually: Actions → Sync repository topics → Run workflow

name: Sync repository topics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  topics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply topics from .github/topics.txt
        env:
          GH_TOKEN: ${{ secrets.REPO_TOPICS_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::REPO_TOPICS_TOKEN secret is not set — cannot sync GitHub topics via API."
            echo "Add topic ultra-igdl manually: repo → About (gear icon) → Topics"
            exit 0
          fi
          topics=$(grep -v '^\s*#' .github/topics.txt | grep -v '^\s*$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          curl -fsSL -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/topics" \
            -d "{\"names\":${topics}}"