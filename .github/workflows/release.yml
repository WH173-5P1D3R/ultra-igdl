name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

  publish-npm:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "ultra-igdl@${VERSION}" version --registry https://registry.npmjs.org 2>/dev/null; then
            echo "ultra-igdl@${VERSION} is already on npm — skipping publish."
            exit 0
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm-skipped:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.NPM_TOKEN == '' }}
    steps:
      - run: |
          echo "::warning::NPM_TOKEN secret is not set. Skipping npm publish."
          echo "Add an npm automation token at: https://www.npmjs.com/settings/~/tokens"
          echo "Then set repository secret NPM_TOKEN: https://github.com/WH173-5P1D3R/ultra-igdl/settings/secrets/actions"

  publish-github:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://npm.pkg.github.com
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish to GitHub Packages
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@wh173-5p1d3r/ultra-igdl@${VERSION}" version --registry https://npm.pkg.github.com 2>/dev/null; then
            echo "@wh173-5p1d3r/ultra-igdl@${VERSION} is already on GitHub Packages — skipping publish."
            exit 0
          fi
          npm pkg set name=@wh173-5p1d3r/ultra-igdl
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}